name: CI
 
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-latest
 
    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3
 
      # 2. Setup Python (LEBIH AMAN 3.10)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn joblib pandas
 
      # 4. Debug struktur
      - name: Show project structure
        run: ls -R
 
      # 5. Hapus conda_env kalau ada (ANTI ERROR)
      - name: Remove conda_env
        run: |
          find . -name "MLproject" -exec sed -i '/conda_env/d' {} +
 
      # 6. Jalankan MLflow Project (FIX PATH)
      - name: Run mlflow project
        run: |
          mlflow run . --env-manager=local
 
      # 7. Simpan hasil mlruns (OPSIONAL)
      - name: Save mlruns to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add mlruns/ || echo "no mlruns"
          git commit -m "Save mlruns from CI run" || echo "nothing to commit"
          git push origin main